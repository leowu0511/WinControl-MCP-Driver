name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        env:
          WCMD_VISION_API_KEY: "sk-dummy-for-import-test"

      - name: Verify entry points
        run: |
          wcmd-mcp --help || python -m wcmd --help

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          WCMD_VISION_API_KEY: "sk-dummy-for-tests"

      - name: Lint
        run: |
          ruff check src/ tests/
        continue-on-error: true
