name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        env:
          WCMD_VISION_API_KEY: "sk-dummy-for-import-test"

      - name: Verify entry points
        run: |
          python -c "import wcmd; print('wcmd', wcmd.__version__)"
          python -c "from wcmd.server import main; from wcmd.engine import main as cli_main; print('entry points OK')"
        env:
          WCMD_VISION_API_KEY: "sk-dummy-for-test"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          WCMD_VISION_API_KEY: "sk-dummy-for-tests"

      - name: Lint
        run: |
          python -m ruff check src/ tests/
        continue-on-error: true
